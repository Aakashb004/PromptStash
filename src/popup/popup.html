<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptStash PRO</title>

  <link rel="stylesheet" href="./popup.css">
</head>

<body>

  <div class="container">

    <!-- Header -->
    <header>
      <h1>PromptStash PRO</h1>
      <span class="version">v5</span>
    </header>

    <!-- Stats -->
    <section class="stats">

      <div class="stat-card">
        <span id="totalStashes">0</span>
        <small>Total Stashes</small>
      </div>

      <div class="stat-card">
        <span id="totalUses">0</span>
        <small>Total Uses</small>
      </div>

    </section>

    <input id="title" type="text" placeholder="Title">

<textarea
  id="content"
  rows="5"
  placeholder="Prompt content">
</textarea>

<button id="saveBtn">
  Save Stash
</button>

<hr>
<div class="stats-bar">
  <span id="stashCount">0 Stashes</span>
</div>
<input
  id="searchInput"
  type="text"
  placeholder="🔍 Search stashes..."
>
<div id="stashList"></div>

  </div>

  <script
    type="module"
    src="./popup.ts"
  ></script>

</body>
</html>
