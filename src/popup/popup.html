<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PromptStash</title>
  <link rel="stylesheet" href="./popup.css">
</head>
<body>

  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="logo-wrapper">
        <svg class="app-logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="m12 3-1.912 5.886A2 2 0 0 1 8.176 10.2H2l5 3.63 1.913 5.885a2 2 0 0 0 3.8 0l1.913-5.885 5-3.63h-6.176a2 2 0 0 1-1.912-1.314Z"/>
        </svg>
        <h1>PromptStash</h1>
      </div>
      <div class="header-actions">
        <button id="toggleDrawerBtn" class="icon-btn-accent" title="New Prompt">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add
        </button>
        <button id="togglePersonaDrawerBtn" class="icon-btn-accent hidden" title="New Persona">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"></line>
            <line x1="5" y1="12" x2="19" y2="12"></line>
          </svg>
          Add Persona
        </button>
      </div>
    </header>

    <!-- Tabs Navigation -->
    <div class="tabs-nav">
      <button id="stashesTabBtn" class="tab-btn active">Stashes</button>
      <button id="personasTabBtn" class="tab-btn">Personas</button>
    </div>

    <!-- Slide-in Drawer for New Prompt -->
    <div id="drawer" class="drawer-overlay hidden">
      <div class="drawer-content">
        <div class="drawer-header">
          <h3>Create Stash</h3>
          <button id="closeDrawerBtn" class="close-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="drawer-body">
          <div class="form-group">
            <label for="title">Title</label>
            <input id="title" type="text" placeholder="e.g., Python expert assistant">
          </div>
          <div class="form-group">
            <label for="tags">Tags</label>
            <input id="tags" type="text" placeholder="e.g., coding, python, helper (comma separated)">
          </div>
          <div class="form-group">
            <label for="autoTrigger">Auto Trigger Shortcut</label>
            <input id="autoTrigger" type="text" placeholder="e.g., python (expands on /python )">
          </div>
          <div class="form-group">
            <label for="stashPersona">AI Persona</label>
            <select id="stashPersona" class="form-select">
              <option value="">None (No system instructions)</option>
              <!-- Persona options dynamically inserted -->
            </select>
          </div>
          <div class="form-group">
            <label for="content">Prompt Template</label>
            <textarea id="content" rows="6" placeholder="Write your prompt content..."></textarea>
            <div class="counter-label"><span id="createLength">0</span> chars | <span id="createTokens">0</span> tokens</div>
          </div>
          <button id="saveBtn" class="primary-btn">
            Save Stash
          </button>
        </div>
      </div>
    </div>

    <!-- Slide-in Drawer for Variable Inputs -->
    <div id="varsDrawer" class="drawer-overlay hidden">
      <div class="drawer-content">
        <div class="drawer-header">
          <h3 id="varsDrawerTitle">Fill Placeholders</h3>
          <button id="closeVarsDrawerBtn" class="close-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="drawer-body">
          <div id="varsFormBody">
            <!-- Dynamic fields will be inserted here -->
          </div>
          <button id="varsSubmitBtn" class="primary-btn" style="margin-top: 12px;">
            Confirm Action
          </button>
        </div>
      </div>
    </div>

    <!-- Slide-in Drawer for Editing Prompt & Version History -->
    <div id="editDrawer" class="drawer-overlay hidden">
      <div class="drawer-content" style="max-height: 95vh; display: flex; flex-direction: column;">
        <div class="drawer-header">
          <h3>Edit Stash</h3>
          <button id="closeEditDrawerBtn" class="close-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="drawer-body" style="overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; padding-bottom: 24px;">
          <input type="hidden" id="editStashId" />
          <div class="form-group">
            <label for="editTitle">Title</label>
            <input id="editTitle" type="text" placeholder="Title">
          </div>
          <div class="form-group">
            <label for="editTags">Tags</label>
            <input id="editTags" type="text" placeholder="Tags (comma separated)">
          </div>
          <div class="form-group">
            <label for="editAutoTrigger">Auto Trigger Shortcut</label>
            <input id="editAutoTrigger" type="text" placeholder="Shortcut trigger">
          </div>
          <div class="form-group">
            <label for="editStashPersona">AI Persona</label>
            <select id="editStashPersona" class="form-select">
              <option value="">None (No system instructions)</option>
              <!-- Persona options dynamically inserted -->
            </select>
          </div>
          <div class="form-group">
            <label for="editContent">Prompt Template</label>
            <textarea id="editContent" rows="5" placeholder="Write your prompt content..."></textarea>
            <div class="counter-label"><span id="editLength">0</span> chars | <span id="editTokens">0</span> tokens</div>
          </div>
          
          <!-- Version History Timeline -->
          <div class="form-group version-history-container">
            <label>Version History</label>
            <div id="versionTimeline" class="version-timeline">
              <!-- Dynamically populated versions -->
            </div>
          </div>

          <button id="updateBtn" class="primary-btn">
            Save Changes
          </button>
        </div>
      </div>
    </div>

    <!-- Slide-in Drawer for New/Edit Persona -->
    <div id="personaDrawer" class="drawer-overlay hidden">
      <div class="drawer-content" style="max-height: 95vh; display: flex; flex-direction: column;">
        <div class="drawer-header">
          <h3 id="personaDrawerTitle">Create Persona</h3>
          <button id="closePersonaDrawerBtn" class="close-btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <div class="drawer-body" style="overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 12px; padding-bottom: 24px;">
          <input type="hidden" id="editPersonaId" />
          <div class="form-group">
            <label for="personaEmoji">Emoji Icon</label>
            <input id="personaEmoji" type="text" placeholder="e.g. 🤖, 🐍, ✍️" maxlength="4">
          </div>
          <div class="form-group">
            <label for="personaName">Persona Name</label>
            <input id="personaName" type="text" placeholder="e.g. Python Sage">
          </div>
          <div class="form-group">
            <label for="personaDescription">Description</label>
            <input id="personaDescription" type="text" placeholder="e.g. Expert code optimizer and compiler helper">
          </div>
          <div class="form-group">
            <label for="personaSystemPrompt">System Prompt (Instructions)</label>
            <textarea id="personaSystemPrompt" rows="8" placeholder="You are a professional compiler. Explain logic steps, write clean code, and..."></textarea>
          </div>
          <button id="savePersonaBtn" class="primary-btn">
            Save Persona
          </button>
        </div>
      </div>
    </div>

    <!-- Search Section -->
    <div class="search-container">
      <div class="search-wrapper">
        <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <input id="searchInput" type="text" placeholder="Search stashes by title or tags...">
        <div class="search-shortcut">⌘K</div>
      </div>
    </div>

    <!-- Stats summary grid -->
    <section class="quick-stats">
      <div class="stat-card">
        <span id="totalStashes" class="stat-value">0</span>
        <span class="stat-label">Total Prompts</span>
      </div>
      <div class="stat-card">
        <span id="totalUses" class="stat-value">0</span>
        <span class="stat-label">Injections</span>
      </div>
      <div class="stat-card">
        <span id="favoriteCount" class="stat-value">0</span>
        <span class="stat-label">Favorites</span>
      </div>
    </section>

    <!-- Stashes scroll view -->
    <main class="stash-container">
      <div id="stashList" class="stash-list">
        <!-- Prompts dynamically loaded here -->
      </div>
      <div id="personasList" class="stash-list hidden">
        <!-- Personas dynamically loaded here -->
      </div>
    </main>

    <!-- Analytics Drawer/Collapse details -->
    <section class="analytics-card">
      <div class="analytics-row">
        <div class="analytics-item">
          <small>Avg. Length</small>
          <span id="averageSize">0</span> <small>chars</small>
        </div>
        <div class="analytics-item">
          <small>Total Stored</small>
          <span id="totalCharacters">0</span> <small>chars</small>
        </div>
      </div>
    </section>

    <!-- Backup footer controls -->
    <footer class="app-footer">
      <div class="backup-actions">
        <button id="exportBtn" class="secondary-btn">
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
          Export
        </button>
        <button id="importBtn" class="secondary-btn">
          <svg class="btn-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="7 10 12 15 17 10"></polyline>
            <line x1="12" y1="15" x2="12" y2="3"></line>
          </svg>
          Import
        </button>
        <input type="file" id="importFile" accept=".json" hidden />
      </div>
      <div id="stashCount" class="footer-count">0 Stashes</div>
    </footer>
  </div>

  <script type="module" src="./popup.ts"></script>
</body>
</html>
